{% extends "base.html" %}

{% block scripts %}
{{ super() }}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var inner = document.querySelector(".md-header__inner");
    if (!inner) return;

    var githubSvg =
      '<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true" style="flex-shrink:0">' +
      '<path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>' +
      '</svg>';

    var sunSvg =
      '<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true" style="flex-shrink:0">' +
      '<circle cx="12" cy="12" r="4"/>' +
      '<path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>' +
      '</svg>';

    var cta = document.createElement("div");
    cta.className = "sun-header-cta";
    cta.innerHTML =
      '<a href="https://sunmintz.com/" target="_blank" rel="noopener" class="sun-hbtn sun-hbtn--primary">' +
        sunSvg + ' sunmintz.com' +
      '</a>' +
      '<a href="https://github.com/sundante/sun-course-genai" target="_blank" rel="noopener" class="sun-hbtn">' +
        githubSvg + ' Star' +
      '</a>';

    var search = inner.querySelector(".md-search");
    if (search) {
      inner.insertBefore(cta, search);
    } else {
      inner.appendChild(cta);
    }
  });
</script>
{% endblock %}
