site_name: GenAI Learning Curriculum
site_description: A structured curriculum covering the full modern GenAI stack — from foundational LLMs through autonomous agentic systems.
site_url: https://sundante.github.io/sun-course-genai
repo_name: sundante/sun-course-genai
repo_url: https://github.com/sundante/sun-course-genai
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - admonition
  - tables

plugins:
  - search

extra:
  analytics:
    provider: google
    property: G-STDCPPFR30

