site_name: GenAI Learning Curriculum
site_description: A structured curriculum covering the full modern GenAI stack — from foundational LLMs through autonomous agentic systems.
site_url: https://sundante.github.io/sun-course-genai
docs_dir: Notes

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
    - content.code.copy

plugins:
  - search

